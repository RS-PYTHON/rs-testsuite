default_language_version:
    python: python3
default_stages: [pre-commit]
repos:

# Basic verifications
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: check-merge-conflict
    -   id: end-of-file-fixer
    -   id: trailing-whitespace
    -   id: check-toml
    -   id: check-yaml
        exclude: services/frontend/tests/resources/tools/invalid.yml

# Format (black)
-   repo: https://github.com/psf/black
    rev: 26.5.1
    hooks:
    -   id: black

# Format (isort)
-   repo: https://github.com/PyCQA/isort
    rev: 8.0.1
    hooks:
    -   id: isort
        args: ["--profile", "black"]

# Format (add trailing commas)
-   repo: https://github.com/asottile/add-trailing-comma
    rev: v4.0.0
    hooks:
    -   id: add-trailing-comma

-   repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
    -   id: pyupgrade
        args: [--py313-plus]

-   repo: https://github.com/pycqa/flake8
    rev: 7.3.0
    hooks:
    -   id: flake8
        args: [--max-complexity=10, --max-line-length=127]

- repo: https://github.com/google/addlicense
  rev: v1.2.0
  hooks:
  - id: addlicense
    files: \.(css|html|js|py|sh|yml|yaml)$
    args: [ "-c", "Airbus", "-l", "apache" ]

# Remarks:
#   - we don't use ruff because it uses pylint that returns an error code for quality issues
#     that prevents you from commiting your code.
