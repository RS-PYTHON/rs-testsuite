header:
  license:
    spdx-id: Apache-2.0
    copyright-owner: Airbus, CS Group
    copyright-year: '2023-2026'

  paths-ignore:
    - '**/*.cfg'
    - '**/*.csv'
    - '**/*.env'
    - '**/*.json'
    - '**/*.md'
    - '**/*.template'
    - '**/*.tfvars'
    - '**/Dockerfile*'
    - '**/NOTES.txt'
    - '**/empty.txt'
    - '**/.gitignore'
    - '**/.helmignore'
    - '.gitattributes'
    - '.gitmodules'
    - '.safety-project.ini'
    - '.trivyignore'
    - '.yamllint'
    - 'LICENSE'
    - 'NOTICE'

  comment: on-failure
