name: Check code quality

on:
  push:
    branches: [develop, main] # pushes on the 'develop' or 'main' branches
    tags: ['**'] # new git tags (including hierarchical tags like v1.0/beta)
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  call-reusable-workflow:
    name: _
    uses: RS-PYTHON/actions/.github/workflows/reusable-check-quality.yml@develop
    with:
        caller-repository: ${{ github.repository }}
        caller-ref: ${{ github.ref }}
        caller-ref_name: ${{ github.ref_name }}
    secrets:
      SAFETY_API_KEY: ${{ secrets.SAFETY_API_KEY }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    permissions:
      contents: write # for apache/skywalking-eyes/header
      pull-requests: write # for apache/skywalking-eyes/header and phwt/sonarqube-quality-gate-action
